<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScriptForge — Screenplay Writing</title>
  <meta name="description" content="Professional screenplay writing with real-time collaboration." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/pro.css" />
</head>
<body>
  <!-- Auth Modal -->
  <div id="auth-modal" class="modal-overlay active">
    <div class="modal-box" id="auth-box">
      <div class="modal-logo">
        <div class="auth-wordmark">ScriptForge</div>
        <p>Professional Screenplay Writing</p>
      </div>

      <div class="tab-group" id="auth-tabs">
        <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="tab" id="tab-register" onclick="switchTab('register')">Create Account</button>
      </div>

      <form id="login-form" class="auth-form" onsubmit="handleLogin(event)">
        <div class="field-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="field-group">
          <label for="login-password">Password</label>
          <input type="password" id="login-password" placeholder="Password" required autocomplete="current-password" />
        </div>
        <div id="login-error" class="form-error hidden"></div>
        <button type="submit" class="btn-primary" id="login-btn"><span>Sign In</span></button>
      </form>

      <div class="oauth-divider"><span>or</span></div>
      <a href="/auth/google" class="btn-google" id="google-btn">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.185l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.962L3.964 6.294C4.672 4.166 6.656 3.58 9 3.58z"/></svg>
        Sign in with Google
      </a>

      <form id="register-form" class="auth-form hidden" onsubmit="handleRegister(event)">
        <div class="field-group">
          <label for="reg-name">Display Name</label>
          <input type="text" id="reg-name" placeholder="Your Name" required />
        </div>
        <div class="field-group">
          <label for="reg-email">Email</label>
          <input type="email" id="reg-email" placeholder="you@example.com" required autocomplete="email" />
        </div>
        <div class="field-group">
          <label for="reg-password">Password</label>
          <input type="password" id="reg-password" placeholder="Min. 6 characters" required autocomplete="new-password" minlength="6" />
        </div>
        <div id="reg-error" class="form-error hidden"></div>
        <button type="submit" class="btn-primary" id="reg-btn"><span>Create Account</span></button>
      </form>
    </div>
  </div>

  <!-- Main App -->
  <div id="app" class="hidden">
    <nav class="topnav">
      <div class="nav-left">
        <span class="nav-wordmark">ScriptForge</span>
      </div>
      <div class="nav-right">
        <div class="user-badge" id="user-badge">
          <div class="user-avatar" id="user-avatar"></div>
          <span id="user-name-display"></span>
          <button class="btn-ghost" onclick="logout()">Sign out</button>
        </div>
      </div>
    </nav>

    <main class="dashboard">
      <div class="dashboard-header">
        <div>
          <h2>Scripts</h2>
          <p class="subtitle">Write. Collaborate. Export.</p>
        </div>
        <button class="btn-primary" id="new-script-btn" onclick="openNewScriptModal()">New Script</button>
      </div>

      <div id="empty-state" class="empty-state hidden">
        <div class="empty-icon-text">No scripts yet</div>
        <p>Create your first screenplay to get started.</p>
        <button class="btn-primary" onclick="openNewScriptModal()">New Script</button>
      </div>

      <div class="scripts-grid" id="scripts-grid"></div>
    </main>
  </div>

  <!-- New Script Modal -->
  <div class="modal-overlay hidden" id="new-script-modal">
    <div class="modal-box modal-small">
      <h3>New Script</h3>
      <form onsubmit="createScript(event)">
        <div class="field-group">
          <label for="new-title">Title</label>
          <input type="text" id="new-title" placeholder="Untitled" required autofocus />
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-ghost" onclick="closeNewScriptModal()">Cancel</button>
          <button type="submit" class="btn-primary" style="width:auto;">Create</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal-overlay hidden" id="delete-modal">
    <div class="modal-box modal-small">
      <h3>Delete Script?</h3>
      <p style="color:var(--text-muted);margin-bottom:1.5rem;font-size:.875rem;">This action cannot be undone.</p>
      <div class="modal-actions">
        <button class="btn-ghost" onclick="closeDeleteModal()">Cancel</button>
        <button class="btn-danger" id="confirm-delete-btn">Delete</button>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script src="/js/dashboard.js"></script>

  <script>
    // Handle OAuth redirect token
    (function() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('oauth_token');
      const error = params.get('error');
      if (token) {
        localStorage.setItem('sf_token', token);
        // Decode user from token payload
        try {
          const payload = JSON.parse(atob(token.split('.')[1]));
          localStorage.setItem('sf_user', JSON.stringify(payload));
        } catch(e) {}
        window.history.replaceState({}, '', '/');
        window.location.reload();
      }
      if (error === 'google_not_configured') {
        // Show error after page loads
        window.addEventListener('DOMContentLoaded', () => {
          const el = document.getElementById('login-error');
          if (el) { el.textContent = 'Google login is not configured yet. Use email/password login.'; el.classList.remove('hidden'); }
        });
      }
    })();
  </script>
</body>
</html>
