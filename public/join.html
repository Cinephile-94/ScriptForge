<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScriptForge — Join Collaboration</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;">
    <div class="modal-box" style="text-align:center;">
      <div class="modal-logo">
        <span class="logo-icon">🎬</span>
        <h1>ScriptForge</h1>
        <p>You've been invited to collaborate on a script.</p>
      </div>
      <div id="join-status" style="color:var(--text-secondary);margin:1rem 0;">Joining…</div>
      <div id="auth-section" class="hidden">
        <p style="color:var(--text-muted);font-size:.875rem;margin-bottom:1rem;">You need to be signed in to join.</p>
        <button class="btn-primary" onclick="window.location.href='/'">Sign In / Register</button>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
  <script>
    const token = window.location.pathname.split('/').pop();

    async function joinScript() {
      if (!Auth.isLoggedIn()) {
        localStorage.setItem('sf_pending_invite', token);
        document.getElementById('join-status').textContent = 'Please sign in to join.';
        document.getElementById('auth-section').classList.remove('hidden');
        return;
      }

      try {
        const res = await Auth.apiFetch(`/api/join/${token}`, { method: 'POST' });
        if (!res) return;
        const data = await res.json();
        if (data.scriptId) {
          document.getElementById('join-status').textContent = 'Joined! Redirecting…';
          setTimeout(() => window.location.href = `/editor/${data.scriptId}`, 800);
        } else {
          document.getElementById('join-status').textContent = data.error || 'Invalid or expired invite link.';
        }
      } catch {
        document.getElementById('join-status').textContent = 'Network error. Please try again.';
      }
    }

    joinScript();
  </script>
</body>
</html>
